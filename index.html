<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星とカードの夜話 — アストロ・ルノルマン診断</title>
<style>
  :root{
    --ink:#2E2A22;
    --cream:#F4EFE3;
    --cream-dim:#EAE2CE;
    --navy:#1B2238;
    --navy-deep:#11162A;
    --gold:#B8923E;
    --gold-soft:#D9BD7C;
    --gold-dim:#8A6E2E;
    --line:rgba(184,146,62,0.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--navy-deep);
    background-image:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(184,146,62,0.10), transparent 60%);
    color:var(--cream);
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:48px 20px 80px;
  }
  .stage{
    width:100%;
    max-width:640px;
  }
  .eyebrow{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:12px;
    letter-spacing:0.18em;
    color:var(--gold-soft);
    text-align:center;
    margin:0 0 10px;
  }
  h1.title{
    font-size:30px;
    font-weight:500;
    text-align:center;
    margin:0 0 6px;
    letter-spacing:0.04em;
    line-height:1.5;
  }
  p.sub{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    text-align:center;
    color:var(--cream-dim);
    font-size:13px;
    opacity:0.75;
    margin:0 0 44px;
    line-height:1.8;
  }
  .divider{
    width:64px;height:1px;
    background:var(--gold-dim);
    margin:0 auto 44px;
  }
  .panel{
    display:none;
    animation:rise 0.5s ease both;
  }
  .panel.active{display:block;}
  @keyframes rise{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
  }
  .step-label{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:11px;
    letter-spacing:0.12em;
    color:var(--gold);
    margin-bottom:14px;
  }
  .field-block{margin-bottom:30px;}
  label.q{
    display:block;
    font-size:17px;
    margin-bottom:14px;
    line-height:1.7;
  }
  input[type="date"]{
    width:100%;
    background:rgba(244,239,227,0.06);
    border:1px solid var(--line);
    border-radius:2px;
    color:var(--cream);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:16px;
    padding:13px 14px;
    outline:none;
  }
  input[type="date"]:focus{border-color:var(--gold);}
  input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.8) sepia(1) saturate(2) hue-rotate(10deg);}

  .theme-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .theme-opt{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    border:1px solid var(--line);
    background:rgba(244,239,227,0.04);
    color:var(--cream);
    padding:16px 12px;
    text-align:center;
    font-size:14px;
    cursor:pointer;
    border-radius:2px;
    transition:border-color 0.2s, background 0.2s;
  }
  .theme-opt:hover{border-color:var(--gold-dim);}
  .theme-opt.selected{
    border-color:var(--gold);
    background:rgba(184,146,62,0.14);
    color:var(--gold-soft);
  }

  .btn-row{margin-top:36px; text-align:center;}
  button.next{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:transparent;
    border:1px solid var(--gold);
    color:var(--gold-soft);
    font-size:14px;
    letter-spacing:0.1em;
    padding:13px 38px;
    cursor:pointer;
    border-radius:2px;
    transition:background 0.2s, color 0.2s;
  }
  button.next:hover:not(:disabled){background:var(--gold); color:var(--navy-deep);}
  button.next:disabled{opacity:0.3; cursor:default;}
  button.ghost{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:none;
    border:none;
    color:var(--cream-dim);
    font-size:12px;
    opacity:0.6;
    cursor:pointer;
    margin-top:18px;
    display:block;
    margin-left:auto;
    margin-right:auto;
    text-decoration:underline;
  }

  /* カード演出 */
  .deck-instruction{
    text-align:center;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:13px;
    color:var(--cream-dim);
    opacity:0.8;
    margin-bottom:28px;
  }
  .card-row{
    display:flex;
    justify-content:center;
    gap:16px;
    perspective:1000px;
    margin-bottom:8px;
  }
  .card-slot{
    width:108px;
    height:160px;
    position:relative;
  }
  .card-inner{
    width:100%;height:100%;
    position:relative;
    transition:transform 0.7s cubic-bezier(.4,.2,.2,1);
    transform-style:preserve-3d;
    cursor:pointer;
  }
  .card-inner.flipped{transform:rotateY(180deg);}
  .card-face{
    position:absolute; inset:0;
    border-radius:6px;
    backface-visibility:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    border:1px solid var(--gold-dim);
  }
  .card-back{
    background:
      repeating-linear-gradient(45deg, rgba(184,146,62,0.10) 0 2px, transparent 2px 10px),
      var(--navy);
  }
  .card-back::after{
    content:"✦";
    color:var(--gold-soft);
    font-size:22px;
    opacity:0.6;
  }
  .card-front{
    background:var(--cream);
    color:var(--ink);
    transform:rotateY(180deg);
    padding:10px 6px 12px;
  }
  .card-front svg{width:42px; height:42px; margin-bottom:8px;}
  .card-front .cname{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:12px;
    font-weight:500;
    text-align:center;
    line-height:1.4;
  }
  .card-front .cno{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:9px;
    color:var(--gold-dim);
    margin-top:4px;
    letter-spacing:0.05em;
  }

  /* 結果表示 */
  .loading-wrap{
    text-align:center;
    padding:50px 0;
  }
  .loading-wrap .candle{
    width:1px; height:34px;
    background:var(--gold);
    margin:0 auto 18px;
    opacity:0.6;
    animation:flicker 1.6s ease-in-out infinite;
  }
  @keyframes flicker{
    0%,100%{opacity:0.3; height:30px;}
    50%{opacity:0.8; height:38px;}
  }
  .loading-wrap p{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:13px;
    color:var(--cream-dim);
    opacity:0.7;
  }
  .result-meta{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:12px;
    color:var(--gold-soft);
    letter-spacing:0.08em;
    text-align:center;
    margin-bottom:6px;
  }
  .result-title{
    text-align:center;
    font-size:22px;
    margin:0 0 30px;
    line-height:1.6;
  }
  .result-cards-strip{
    display:flex;
    justify-content:center;
    gap:24px;
    margin-bottom:34px;
  }
  .strip-item{text-align:center;}
  .strip-item svg{width:30px; height:30px; opacity:0.85;}
  .strip-item .sname{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:11px;
    color:var(--cream-dim);
    margin-top:6px;
  }
  .result-body{
    font-size:16px;
    line-height:2.0;
    white-space:pre-wrap;
  }
  .result-body .lbl{
    display:block;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:12px;
    letter-spacing:0.1em;
    color:var(--gold);
    margin:32px 0 10px;
  }
  .result-body .lbl:first-child{margin-top:0;}
  .error-box{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    font-size:13px;
    color:#D98B7C;
    text-align:center;
    line-height:1.8;
  }
  .footer-actions{
    margin-top:48px;
    text-align:center;
  }
  @media (max-width:480px){
    .card-slot{width:88px; height:132px;}
    .theme-grid{grid-template-columns:1fr 1fr;}
    h1.title{font-size:24px;}
  }
</style>
</head>
<body>
<div class="stage">

  <p class="eyebrow">ASTRO × LENORMAND</p>
  <h1 class="title">星とカードの夜話</h1>
  <p class="sub">生まれた日の星と、めくられた三枚の札。<br>ふたつの言葉を重ねて、いまのあなたに渡す一節を綴ります。</p>
  <div class="divider"></div>

  <!-- STEP 1: 生年月日 -->
  <div class="panel active" id="panel-1">
    <p class="step-label">第一の扉 ── 星をたずねる</p>
    <div class="field-block">
      <label class="q" for="birthdate">あなたが生まれた日を教えてください。</label>
      <input type="date" id="birthdate" min="1920-01-01" max="2026-06-26">
    </div>
    <div class="btn-row">
      <button class="next" id="btn-step1" disabled>カードを引く準備へ</button>
    </div>
  </div>

  <!-- STEP 2: テーマ -->
  <div class="panel" id="panel-2">
    <p class="step-label">第二の扉 ── 知りたいことをひとつ</p>
    <div class="field-block">
      <label class="q">今宵、いちばん占いたいのはどの夜ですか。</label>
      <div class="theme-grid" id="theme-grid">
        <div class="theme-opt" data-theme="恋愛・人との縁">恋愛・人との縁</div>
        <div class="theme-opt" data-theme="仕事・キャリア">仕事・キャリア</div>
        <div class="theme-opt" data-theme="お金・収入の流れ">お金・収入の流れ</div>
        <div class="theme-opt" data-theme="これからの全体運">これからの全体運</div>
      </div>
    </div>
    <div class="btn-row">
      <button class="next" id="btn-step2" disabled>カードをめくる</button>
    </div>
  </div>

  <!-- STEP 3: カード -->
  <div class="panel" id="panel-3">
    <p class="step-label">第三の扉 ── 三枚の札</p>
    <p class="deck-instruction">一枚ずつ、好きな順番でめくってください。</p>
    <div class="card-row" id="card-row"></div>
    <div class="btn-row">
      <button class="next" id="btn-step3" disabled>夜話を綴ってもらう</button>
    </div>
  </div>

  <!-- STEP 4: 結果 -->
  <div class="panel" id="panel-4">
    <div id="result-area"></div>
  </div>

</div>

<script>
(function(){

  // ---------- ルノルマン36象徴（オリジナルの簡易アイコン・伝統的な意味の要約） ----------
  const LENORMAND = [
    {id:1,name:"騎士",key:"知らせ・動き出し",icon:"M10 32 L30 10 M22 10 L30 10 L30 18"},
    {id:2,name:"クローバー",key:"小さな幸運",icon:"M20 10 a5 5 0 1 1 0.1 0 a5 5 0 1 1 -7 7 a5 5 0 1 1 7-7 a5 5 0 1 1 7 7 a5 5 0 1 1 -7-7 M20 22 L20 32"},
    {id:3,name:"船",key:"遠方・旅・交流",icon:"M8 26 Q20 34 32 26 L28 26 L28 12 L16 12 L16 26 Z"},
    {id:4,name:"家",key:"安定・基盤",icon:"M8 20 L20 8 L32 20 M12 20 L12 32 L28 32 L28 20"},
    {id:5,name:"木",key:"健康・成長",icon:"M20 6 Q12 14 16 20 Q10 22 14 28 Q9 30 14 33 L26 33 Q31 30 26 28 Q30 22 24 20 Q28 14 20 6 M20 33 L20 38"},
    {id:6,name:"雲",key:"迷い・不確かさ",icon:"M10 24 a6 6 0 1 1 1-10 a8 8 0 0 1 15 1 a6 6 0 1 1 1 9 Z"},
    {id:7,name:"蛇",key:"回り道・誘惑",icon:"M8 14 Q16 14 16 20 Q16 26 24 26 Q32 26 32 20"},
    {id:8,name:"棺",key:"終わりと転換",icon:"M11 18 L29 18 L26 32 L14 32 Z M11 18 L20 9 L29 18"},
    {id:9,name:"花束",key:"喜び・贈り物",icon:"M20 32 L20 18 M20 18 a5 5 0 1 1 -5-5 a5 5 0 1 1 5 5 a5 5 0 1 1 5-5 a5 5 0 1 1 -5 5"},
    {id:10,name:"鎌",key:"決断・切り離し",icon:"M10 30 Q12 14 26 12 Q30 12 30 16 Q30 20 25 19 Q14 17 10 30 Z"},
    {id:11,name:"鞭",key:"摩擦・繰り返し",icon:"M10 30 Q18 10 30 10 M30 10 L26 8 M30 10 L28 14"},
    {id:12,name:"小鳥",key:"会話・噂",icon:"M10 24 Q14 16 22 18 Q20 12 28 12 Q24 18 28 22 Q20 20 16 26 Z"},
    {id:13,name:"子供",key:"始まり・無邪気さ",icon:"M20 10 a4 4 0 1 1 0.1 0 M20 14 L20 26 M14 18 L26 18 M20 26 L14 34 M20 26 L26 34"},
    {id:14,name:"狐",key:"用心・狡知",icon:"M9 30 L13 16 L20 22 L27 16 L31 30 Z M13 16 L9 10 L15 13 Z M27 16 L31 10 L25 13 Z"},
    {id:15,name:"熊",key:"力・保護",icon:"M14 13 a3.4 3.4 0 1 1 6.8 0 M19.2 13 a3.4 3.4 0 1 1 6.8 0 M12 20 a8 8 0 1 0 16 0 a8 8 0 1 0 -16 0 M15 30 L15 34 L25 34 L25 30"},
    {id:16,name:"星",key:"希望・指針",icon:"M20 8 L23 17 L32 17 L25 23 L27 32 L20 26 L13 32 L15 23 L8 17 L17 17 Z"},
    {id:17,name:"こうのとり",key:"変化・移行",icon:"M14 32 L18 18 Q14 10 22 8 Q28 10 24 16 L30 32"},
    {id:18,name:"犬",key:"忠実・友情",icon:"M11 26 Q10 17 18 17 L19 13 L23 13 L24 17 Q30 17 28 24 L27 24 L27 30 L13 30 L13 24 Z M19 17 a1.4 1.4 0 1 1 2.8 0 a1.4 1.4 0 1 1 -2.8 0"},
    {id:19,name:"塔",key:"孤立・公的な立場",icon:"M16 12 L24 12 L24 32 L16 32 Z M14 12 L26 12 L26 16 L14 16 Z"},
    {id:20,name:"庭",key:"社交・公の場",icon:"M8 30 Q20 14 32 30 Z M14 30 L14 24 M20 30 L20 22 M26 30 L26 24"},
    {id:21,name:"山",key:"障害・距離",icon:"M8 30 L16 14 L22 24 L26 18 L32 30 Z"},
    {id:22,name:"分かれ道",key:"選択・岐路",icon:"M20 32 L20 20 M20 20 L10 10 M20 20 L30 10"},
    {id:23,name:"鼠",key:"消耗・心配",icon:"M12 22 a6 6 0 1 1 12 0 a6 6 0 1 1 -12 0 M24 20 L30 16 M10 24 L6 28"},
    {id:24,name:"心臓",key:"愛情・本心",icon:"M20 30 Q6 18 14 10 Q20 8 20 16 Q20 8 26 10 Q34 18 20 30 Z"},
    {id:25,name:"指輪",key:"約束・結びつき",icon:"M20 13 a8 8 0 1 0 0.1 0"},
    {id:26,name:"書物",key:"知識・秘密",icon:"M10 12 L20 14 L30 12 L30 30 L20 28 L10 30 Z M20 14 L20 28"},
    {id:27,name:"手紙",key:"知らせ・文書",icon:"M9 12 L31 12 L31 28 L9 28 Z M9 12 L20 21 L31 12"},
    {id:28,name:"男性",key:"男性・自分自身",icon:"M20 10 a4 4 0 1 1 0.1 0 M14 32 L14 22 a6 6 0 1 1 12 0 L26 32"},
    {id:29,name:"女性",key:"女性・自分自身",icon:"M20 10 a4 4 0 1 1 0.1 0 M13 32 L16 20 Q20 16 24 20 L27 32"},
    {id:30,name:"百合",key:"成熟・誠実さ",icon:"M20 32 L20 16 M20 16 Q12 16 12 8 Q20 8 20 16 Q20 8 28 8 Q28 16 20 16"},
    {id:31,name:"太陽",key:"成功・活力",icon:"M20 25 a6 6 0 1 1 0.1 0 M20 8 L20 12 M20 32 L20 28 M8 20 L12 20 M32 20 L28 20 M12 12 L15 15 M28 12 L25 15 M12 28 L15 25 M28 28 L25 25"},
    {id:32,name:"月",key:"感情・直感",icon:"M26 10 a12 12 0 1 0 0 20 a9 9 0 1 1 0-20"},
    {id:33,name:"鍵",key:"解決・転機",icon:"M14 14 a5 5 0 1 0 7 7 L30 12 L27 9 L24 12 L22 10"},
    {id:34,name:"魚",key:"豊かさ・流動性",icon:"M8 20 Q16 10 24 20 Q16 30 8 20 Z M24 20 L32 14 M24 20 L32 26"},
    {id:35,name:"錨",key:"安定・継続",icon:"M20 8 a3 3 0 1 1 0.1 0 M20 11 L20 30 M12 22 a8 8 0 0 0 16 0 M10 18 L30 18"},
    {id:36,name:"十字架",key:"試練・運命",icon:"M16 8 L24 8 L24 18 L34 18 L34 26 L24 26 L24 36 L16 36 L16 26 L6 26 L6 18 L16 18 Z"}
  ];

  function svgFor(card){
    return '<svg viewBox="0 0 40 40" fill="none" stroke="#2E2A22" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="'+card.icon+'"/></svg>';
  }

  function zodiac(dateStr){
    const d = new Date(dateStr+"T00:00:00");
    const m = d.getMonth()+1, day = d.getDate();
    const bounds = [
      {m:1,d:19,sign:"山羊座"},{m:2,d:18,sign:"水瓶座"},{m:3,d:20,sign:"魚座"},
      {m:4,d:19,sign:"牡羊座"},{m:5,d:20,sign:"牡牛座"},{m:6,d:21,sign:"双子座"},
      {m:7,d:22,sign:"蟹座"},{m:8,d:22,sign:"獅子座"},{m:9,d:22,sign:"乙女座"},
      {m:10,d:23,sign:"天秤座"},{m:11,d:21,sign:"蠍座"},{m:12,d:21,sign:"射手座"}
    ];
    for(let i=0;i<bounds.length;i++){
      const cur=bounds[i];
      if(m===cur.m && day<=cur.d) return cur.sign;
      if(m===cur.m && day>cur.d) return bounds[(i+1)%12].sign;
    }
    return "山羊座";
  }

  // ---------- state ----------
  let state = {
    birthdate:null,
    zodiacSign:null,
    theme:null,
    drawnCards:[],
    flippedCount:0
  };

  function goTo(stepNum){
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-'+stepNum).classList.add('active');
    window.scrollTo({top:0, behavior:'smooth'});
  }

  // ---------- STEP 1 ----------
  const birthInput = document.getElementById('birthdate');
  const btnStep1 = document.getElementById('btn-step1');
  birthInput.addEventListener('change', ()=>{
    btnStep1.disabled = !birthInput.value;
  });
  btnStep1.addEventListener('click', ()=>{
    state.birthdate = birthInput.value;
    state.zodiacSign = zodiac(state.birthdate);
    goTo(2);
  });

  // ---------- STEP 2 ----------
  const themeOpts = document.querySelectorAll('.theme-opt');
  const btnStep2 = document.getElementById('btn-step2');
  themeOpts.forEach(opt=>{
    opt.addEventListener('click', ()=>{
      themeOpts.forEach(o=>o.classList.remove('selected'));
      opt.classList.add('selected');
      state.theme = opt.dataset.theme;
      btnStep2.disabled = false;
    });
  });
  btnStep2.addEventListener('click', ()=>{
    setupCards();
    goTo(3);
  });

  // ---------- STEP 3: カード抽選 ----------
  const cardRow = document.getElementById('card-row');
  const btnStep3 = document.getElementById('btn-step3');

  function setupCards(){
    cardRow.innerHTML = '';
    state.drawnCards = [];
    state.flippedCount = 0;
    btnStep3.disabled = true;

    const pool = [...LENORMAND];
    for(let i=0;i<3;i++){
      const idx = Math.floor(Math.random()*pool.length);
      const card = pool.splice(idx,1)[0];
      state.drawnCards.push(card);

      const slot = document.createElement('div');
      slot.className = 'card-slot';
      slot.innerHTML =
        '<div class="card-inner">'+
          '<div class="card-face card-back"></div>'+
          '<div class="card-face card-front">'+svgFor(card)+
            '<div class="cname">'+card.name+'</div>'+
            '<div class="cno">'+card.key+'</div>'+
          '</div>'+
        '</div>';
      const inner = slot.querySelector('.card-inner');
      inner.addEventListener('click', ()=>{
        if(inner.classList.contains('flipped')) return;
        inner.classList.add('flipped');
        state.flippedCount++;
        if(state.flippedCount===3){
          btnStep3.disabled = false;
        }
      });
      cardRow.appendChild(slot);
    }
  }

  btnStep3.addEventListener('click', ()=>{
    goTo(4);
    runDivination();
  });

  // ---------- STEP 4: AI生成 ----------
  const resultArea = document.getElementById('result-area');

  function escapeHtml(str){
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function runDivination(){
    resultArea.innerHTML =
      '<div class="loading-wrap"><div class="candle"></div><p>星とカードの言葉を、いますり合わせています…</p></div>';

    const cardNames = state.drawnCards.map(c=>c.name+'（'+c.key+'）').join('、');

    const prompt =
`あなたは「星とカードの夜話」という占いコンテンツの語り手です。西洋占星術とルノルマンカードを組み合わせて、相談者のためだけの一節を書いてください。

【相談者の情報】
・太陽星座：${state.zodiacSign}
・占いたいテーマ：${state.theme}
・引かれたルノルマンカード3枚（順番に意味あり）：${cardNames}

【文章のルール】
・断定的な決めつけや、不安を煽る表現は避ける。読んだ人が少し前向きになれる語り口にする。
・占いっぽい古めかしさは出しつつ、説教臭くせず、ユーモアを少し効かせた自然な日本語にする。
・星座の気質と3枚のカードの並び（流れ）を、ちゃんと結びつけて解釈する。1枚目→2枚目→3枚目で小さな物語になるように。
・以下の見出しで構成し、各見出しの後に改行して本文を書く。見出し自体は最小限の言葉にする。
  【今宵の情景】（星座とカードの流れを使った短い情景描写、2〜3文）
  【読み解き】（テーマに即した解釈、4〜6文程度）
  【ひとつだけ、今日からの所作】（小さな具体的アクション、1〜2文）
・全体で400〜550文字程度の日本語。
・出力は本文のみ。前置きや「もちろんです」のような返答は書かない。`;

    try{
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      if(!response.ok){
        throw new Error('API status ' + response.status);
      }

      const data = await response.json();
      const textBlocks = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text);
      const fullText = textBlocks.join('\n').trim();

      if(!fullText){
        throw new Error('empty response');
      }

      renderResult(fullText);

    }catch(err){
      resultArea.innerHTML =
        '<div class="error-box">夜霧が深く、言葉がうまく届きませんでした。<br>少し時を置いて、もう一度めくってみてください。<br><br>'+
        '<button class="next" id="btn-retry" style="margin-top:18px;">もう一度試す</button></div>';
      document.getElementById('btn-retry').addEventListener('click', runDivination);
    }
  }

  function renderResult(text){
    // 見出し行を <span class="lbl"> に変換
    const withLabels = escapeHtml(text).replace(
      /(【[^】]+】)/g,
      '<span class="lbl">$1</span>'
    );

    const stripHtml = state.drawnCards.map(c=>
      '<div class="strip-item">'+svgFor(c)+'<div class="sname">'+c.name+'</div></div>'
    ).join('');

    resultArea.innerHTML =
      '<div class="result-meta">'+state.zodiacSign+' ／ '+escapeHtml(state.theme)+'</div>'+
      '<h2 class="result-title">今宵の夜話</h2>'+
      '<div class="result-cards-strip">'+stripHtml+'</div>'+
      '<div class="result-body">'+withLabels+'</div>'+
      '<div class="footer-actions"><button class="ghost" id="btn-restart">もう一度、最初から占う</button></div>';

    document.getElementById('btn-restart').addEventListener('click', ()=>{
      state = {birthdate:null, zodiacSign:null, theme:null, drawnCards:[], flippedCount:0};
      birthInput.value = '';
      btnStep1.disabled = true;
      themeOpts.forEach(o=>o.classList.remove('selected'));
      btnStep2.disabled = true;
      goTo(1);
    });
  }

})();
</script>
